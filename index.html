<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Média de Notas</title>
</head>
<body>
    <h1>Calcular Média de Notas</h1>
    <form action="calcular.php" method="get">
        <label for="nameAluno">Nome do Aluno:</label>
        <input type="text" id="nameAluno" name="nameAluno" required><br><br>

        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" name="nota1" min="0" max="10" step="0.01" required><br><br>

        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" name="nota2" min="0" max="10" step="0.01" required><br><br>

        <label for="nota3">Nota 3:</label>
        <input type="number" id="nota3" name="nota3" min="0" max="10" step="0.01" required><br><br>

        <label for="nota4">Nota 4:</label>
        <input type="number" id="nota4" name="nota4" min="0" max="10" step="0.01" required><br><br>

        <input type="submit" value="Calcular Média">
    </form>
</body>
</html>
